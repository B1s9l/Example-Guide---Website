<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Widget Page | Example Guide</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .widgets-root {
      width: min(1440px, calc(100% - 64px));
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 24px;
      align-items: stretch;
      margin: 0 auto;
    }

    .widgets-root > * {
      min-height: 220px;
    }

    @media (max-width: 1240px) {
      .widgets-root {
        width: min(1120px, calc(100% - 56px));
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 920px) {
      .widgets-root {
        width: min(760px, calc(100% - 48px));
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .widget-page {
        padding-top: 20px;
      }

      .widgets-root {
        width: min(420px, calc(100% - 32px));
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .widgets-root > * {
        min-height: 150px;
      }
    }
  </style>
</head>
<body class="widget-page">

  <main class="widget-area widgets-root" id="widget-area" aria-label="Widget Page widgets"></main>

  <script src="/script.js"></script>
  <script src="/widget_types/navigation/widget.js"></script>
  <script src="/widget_definitions/navigation-landing/definition.js"></script>
  <script src="/widget_definitions/navigation-basic/definition.js"></script>
  <script src="/widget_definitions/navigation-widget/definition.js"></script>
  <script src="/widget_definitions/navigation-half-widget/definition.js"></script>
  <script src="/widget_definitions/navigation-contact/definition.js"></script>
  <script src="widget-order.js"></script>
  <script src="/widget-loader.js"></script>
</body>
</html>
